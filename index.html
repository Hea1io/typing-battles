<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Typing Battles</title>
        <link rel="stylesheet" href="style.css">

    </head> 
    <body>
        <div class="container">

        <header>
                <h1>Typing Battles</h1>
                <div class="stats">
                    <span><strong id='wpm'>0</strong> WPM</span>
                    <span><strong id='accuracy'>100</strong>%</span>
                    <span><strong id='timer'>0</strong>s</span>
                </div>
            </header>

                <div class="boss-section">
                    <div class="boss-header">
                        <span id="bossName">William Shakespeare</span>
                        <span id="bossHpText">100/100</span>
                    </div>
                    <div class="boss-health-bar">
                        <div id="bossHealth" class="boss-health-fill"></div>
                    </div>
                </div>

                <main>
                    <div id="textDisplay" class="text-display" tabindex="0"></div>
                    <div class="hint" id="hint">Click above to start typing</div>
                    </main>

                    <footer>
                        <button id="resetBtn">New Fight</button>
                      <button id="shareBtn" class="share-btn">Share Score</button>
                    </footer>
                </div>

   <div id="bossDefeatedModal" class="modal hidden">
                    <div class="modal-content">
                        <div class="modal-header">
                            <span class="modal-icon">yeah</span>
                            <h2 id="modaltitle">BOSS DEFEATED!</h2>
                        </div>
                        <div class="modal-body">
                            <p id="modalBossName" class="modal-boss-name">William Shakespeare</p>
                            <div class='modal-stats'>
                                <div class="modal-stat">
                                    <span class="stat-label">WPM</span>
                                    <span class="stat-value" id="modalWpm">0</span>
                                </div>
                                <div class="modal-stat">
                                    <span class="stat-label">Accuracy</span>
                                    <span class="stat-value" id="modalAccuracy">0%</span>        
                                </div>
                                <div class="modal-stat">
                                    <span class="stat-label">Time</span>
                                    <span class="stat-value" id="modalTime">0s</span>                                
                                </div>
                                <div class="modal-stat">
                                    <span class="stat-label">Quotes</span>
                                    <span class="stat-value" id="modalQuotes">5/5</span>
                                </div>
                            </div>
                            <div class="modal-actions">
                                <button id="modalShareBtn" class="modal-btn share-btn">Share Score</button>
                                <button id="modalNextBtn" class="modal-btn next-btn">Next Boss</button>
                                <button id="modalRedoBtn" class="modal-btn redo-btn">Redo Boss</button>
                            </div>
                        </div>
                    </div>
                </div>

                
            </div>
            <script src="script.js"></script>
        </body>
</html>

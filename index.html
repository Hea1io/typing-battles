<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Typing Battles</title>
        <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <div class="container">
            <header>
                <h1>Typing Battles</h1>
                <div class="stats">
                    <span>WPM: <strong id="wpm">0</strong></span>
                    <span>Accuracy: <strong id="accuracy">100%</strong></span>
                    <span>Timer <strong id="timer">0</strong></span>
                </div>
            </header>

            <main>
                <div id="textDisplay" class="text-display" tabindex="0">

                </div>
               <div class="hint" id="hint">Click the text above to start typiing</div>

            </main>

            <footer>
                <button id="resetBtn">New Text</button>
            </footer>
            </div>
            <script src="script.js"></script>
            

    </body>
</html>
